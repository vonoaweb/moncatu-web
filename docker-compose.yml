# PostgreSQL para desarrollo local de Medusa v2.
# Uso:
#   docker compose up -d
# Luego crea el proyecto Medusa y apunta DATABASE_URL a:
#   postgres://medusa:medusa@localhost:5432/medusa
#
#   npx create-medusa-app@latest moncatu-medusa --db-url "postgres://medusa:medusa@localhost:5432/medusa"

services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: medusa
      POSTGRES_PASSWORD: medusa
      POSTGRES_DB: medusa
