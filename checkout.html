<!DOCTYPE html>
<html lang="es">
<head>
<script>
  if (location.protocol !== 'https:' && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
      location.replace(`https:${location.href.substring(location.protocol.length)}`);
  }
</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://www.gstatic.com https://sdk.mercadopago.com https://*.cloudfunctions.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' https://firebasestorage.googleapis.com https://vonoaweb.github.io https://placehold.co https://http2.mlstatic.com data: blob:; connect-src 'self' https://moncatu-backend-production.up.railway.app https://*.firebaseio.com https://*.googleapis.com https://api.mercadopago.com; frame-src https://sdk.mercadopago.com;">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta http-equiv="X-Frame-Options" content="DENY">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <title>Checkout - Moncatu</title>
  <link rel="icon" type="image/svg+xml" href="img/favicon.svg?v=2">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="cart-styles.css">
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body>
  <main class="checkout-page">
    <div class="checkout-container">
      <div class="checkout-form">
        <h1>Finalizar Compra</h1>

        <form id="checkout-form">
          <h3>Información de Contacto</h3>
          <input type="email" name="email" placeholder="Email" required>
          <input type="text" name="name" placeholder="Nombre completo" required>
          <input type="tel" name="phone" placeholder="Teléfono" required>

          <h3>Dirección de Envío</h3>
          <input type="text" name="street" placeholder="Calle y número" required>
          <input type="text" name="city" placeholder="Ciudad" required>
          <input type="text" name="state" placeholder="Estado" required>
          <input type="text" name="zipCode" placeholder="Código Postal" required>

          <button type="submit" class="btn-submit">Pagar con Mercado Pago</button>
        </form>
      </div>

      <div id="order-summary"></div>
    </div>
  </main>

  <script src="moncatu-config.js"></script>
  <script src="firebase-config.js"></script>
  <script src="sanitize.js"></script>
  <script src="checkout.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      var form = document.getElementById('checkout-form');
      if (form && typeof MoncatuSanitize !== 'undefined') {
        MoncatuSanitize.applyToForm(form);
      }
    });
  </script>
</body>
</html>
